<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Строим небоскрёб</title>
    <style>
        body {
            padding: 0;
            margin: 0;
        }

        .building {
            background: linear-gradient(90deg, #4a4a4a, #8a8a8a);
            padding: 20px;
            border-radius: 10px;
            color: white;
            margin: 20px;
        }

        .floor {
            border-bottom: 2px solid #ffd700;
            padding: 5px;
            margin: 2px;
            background:
            rgba(255,255,255,0.1);
        }

        .building-description {
            max-width: 300px;
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            overflow-y: auto;
            white-space: pre;
            font-family: 'Courier New', monospace;
            line-height: 1.4;
            max-width: 100%;
        }

        #buildingContainer {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            padding: 40px;
            min-height: 100vh;
            color: white;
        }
        .roof {
            width: 280px;
            height: 140px;
            background: #4a4e69;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            margin-bottom: -2px;
            animation: dropIn 0.8s ease-out;
        }
        .floor {
            width: 180px;
            height: 35px;
            background: #9a8c98;
            border: 2px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            transition: transform 0.3s;
            animation: slideIn 0.5s ease-out backwards;
        }
        .floor:hover {
            transform: scale(1.05);
            background: #c9ada7;
            z-index: 10;
            cursor: pointer;
        }
        .foundation {
            width: 220px;
            height: 20px;
            background: #444;
            border-radius: 4px 4px 0 0;
            margin-top: -2px;
        }
        .building-description {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            white-space: pre-line;
            text-align: center;
            border-left: 4px solid #f2e9e4;
            animation: fadeIn 1.5s ease-in;
        }
    </style>
</head>
<body>
    <div id="buildingContainer"></div>

    <script src="./scripts/app.js"></script>
</body>
</html>
