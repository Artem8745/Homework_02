<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя первая программа</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
pre { background: #f0f0f0; padding: 15px; border-radius: 8px; }
</style>
</head>
<body>
<h1>✨ Моя первая программа на JavaScript</h1>
<p>Смотри результат в консоли (F12 → Console)</p>
<div class="result"></div>

<style>
    .result {
        max-width: 300px;
        background: #2d2d2d;
        color: #f8f8f2;
        padding: 20px;
        border-radius: 8px;
        overflow-x: auto;
        overflow-y: auto;
        white-space: pre;
        font-family: 'Courier New', monospace;
        line-height: 1.4;
        max-width: 100%;

        transform: rotate(0deg);
        transition-duration: 1s;
    }

@keyframes smoothRotate {
    0% {
        transform: rotate(0deg) scale(1);
        background: gray;
    }
    25% {
        transform: rotate(45deg) scale(1.05);
        background: #95a5a6;
    }
    50% {
        transform: rotate(90deg) scale(1.1);
        background: #7f8c8d;
    }
    75% {
        transform: rotate(135deg) scale(1.05);
        background: #2ecc71;
    }
    100% {
        transform: rotate(180deg) scale(1);
        background: #27ae60;
    }
}

    ._active {
        animation: rotateAnimation 0.5s ease-in-out;
    }
</style>

<script>
// ========== МОЯ ПЕРВАЯ ПРОГРАММА ==========

// Приветствие
console.log("Программа запущена!", "color: green; font-size: 16px");

// Запрашиваем данные
let name = prompt("Привет! Как тебя зовут?");
let birthYear = prompt("В каком году ты родился?");

// Превращаем текст в число
birthYear = Number(birthYear);

// Получаем текущий год
let currentYear = new Date().getFullYear();

// Вычисляем возраст
let age = currentYear - birthYear;

// Сколько до 100 лет
let yearsTo100 = 100 - age;

// Создаем визитку
let businessCard = `
╔══════════════════════════════╗
║ �� ЦИФРОВАЯ ВИЗИТКА ║
╠══════════════════════════════╣
║ Имя: ${name}
║ Год рождения: ${birthYear}
║ Сейчас: ${currentYear} год
║ Тебе: ${age} лет
║
║ ⏳ До 100 лет: ${yearsTo100 > 0 ? yearsTo100 : "уже есть 100!"}
║
║ ${age >= 18 ? "✅ Совершеннолетний" : "Несовершеннолетний"}
╚══════════════════════════════╝
`;

document.querySelector('.result').innerHTML += businessCard

setInterval(() => {
    if (document.querySelector('.result').classList.contains("_active") == true) {
        document.querySelector('.result').classList.remove("_active")
    } else {
        document.querySelector('.result').classList.add("_active")
    }
}, 1500);

// Выводим визитку
console.log(businessCard);

// Дополнительная информация
console.log(`Сегодня: ${new Date().toLocaleDateString()}`);
console.log("Программа успешно завершена!", "color: blue;");

// Показываем сообщение пользователю
alert(`Привет, ${name}! Тебе ${age} лет. Загляни в консоль (F12)!`);
</script>
</body>
</html>
